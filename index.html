<!DOCTYPE html>
<html lang="uk">
<head>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">

    <title>⚡ STICK COIN v2026051902</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #07FFFF; --bg: #030303; --card: #0d0d0d; --g: #00ff88; --r: #ff3366; --gold: #ffcc00; }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .status-banner {
            background: linear-gradient(90deg, #ff3366, #ffcc00, #07FFFF);
            padding: 15px;
            text-align: center;
            font-weight: 900;
            font-size: 18px;
            animation: pulse-banner 1s infinite;
        }
        @keyframes pulse-banner { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

        .glass { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 14px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 900; background: var(--p); color: #000; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron', sans-serif; font-size: 14px; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }

        .header { padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; align-items: center; background: #000; z-index: 40; }
        .av { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--p); object-fit: cover; background: #1a1a1a; }

        .view { flex: 1; padding: 15px; display: none; overflow-y: auto; padding-bottom: 100px; }
        .view.active { display: block; animation: fade 0.3s ease; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .orb { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--g); margin: 30px auto; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .orb:hover { transform: scale(1.05); }
        .orb.on { border-color: var(--r); animation: pulse 2s infinite; background: rgba(255, 51, 102, 0.1); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        nav { position: fixed; bottom: 0; width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); background: #000; border-top: 1px solid #111; padding: 12px 0 25px; z-index: 50; }
        .tab { text-align: center; color: #444; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .tab.active { color: var(--p); }
        .tab span { display: block; font-size: 8px; text-transform: uppercase; margin-top: 4px; }

        .version-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #ff3366;
            color: #fff;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            z-index: 100;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
        }
    </style>
</head>
<body>

<div class="version-badge">⚡ v2026051902</div>

            🔥 ФАЙЛ УСПІШНО ОНОВЛЕНО!
        </div>

        <div style="background: #0d0d0d; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #07FFFF;">

            <p style="margin: 0 0 5px 0; font-size: 12px;">Це НОВА версія файлу</p>

<div id="main-scr" style="display:none; flex-direction:column; height:100vh;">
